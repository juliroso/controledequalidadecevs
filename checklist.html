<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist de Inspeção - CEVS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #F2F2F2; }
        header { background-color: #00004B; color: white; padding: 25px; text-align: center; border-bottom: 5px solid #F29509; }
        .container { max-width: 600px; margin: 20px auto; padding: 15px; }
        .btn-voltar { display: inline-block; margin-bottom: 15px; color: #4A0352; text-decoration: none; font-weight: bold; }
        
        .secao { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #4A0352; font-family: 'Poppins', sans-serif; font-size: 18px; border-bottom: 2px solid #F2F2F2; padding-bottom: 10px; margin-top: 0; }
        
        .item-check { display: flex; align-items: flex-start; margin-bottom: 15px; cursor: pointer; }
        .item-check input { width: 22px; height: 22px; margin-right: 12px; cursor: pointer; accent-color: #F29509; }
        .item-check span { font-size: 15px; color: #333; line-height: 1.4; }

        .btn-pdf { display: block; width: 100%; background: #00004B; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        @media print {
            .btn-voltar, .btn-pdf, header { display: none !important; }
            body { background: white; }
            .secao { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<header>
    <h1 style="font-family: 'Poppins', sans-serif; margin: 0; font-size: 22px;">CHECKLIST DE INSPEÇÃO</h1>
    <p style="margin: 5px 0 0; opacity: 0.8;">Fiscalização de Mamografia</p>
</header>

<div class="container">
    <a href="index.html" class="btn-voltar">← Voltar ao Menu</a>

    <div class="secao">
        <h2>1. Documentação Técnica</h2>
        <label class="item-check">
            <input type="checkbox"> <span>Alvará Sanitário vigente e visível.</span>
        </label>
        <label class="item-check">
            <input type="checkbox"> <span>Laudo de Levantamento Radiométrico (Baritagem).</span>
        </label>
        <label class="item-check">
            <input type="checkbox"> <span>Relatório Anual de Física Médica atualizado.</span>
        </label>
    </div>

    <div class="secao">
        <h2>2. Testes de Constância</h2>
        <label class="item-check">
            <input type="checkbox"> <span>Força de Compressão (Manual entre 11-20kgf).</span>
        </label>
        <label class="item-check">
            <input type="checkbox"> <span>Alinhamento do Campo de Luz/Raio-X (≤ 2%).</span>
        </label>
        <label class="item-check">
            <input type="checkbox"> <span>Qualidade de Imagem com Simulador (Phantom).</span>
        </label>
    </div>

    <div class="secao">
        <h2>3. Proteção Radiológica</h2>
        <label class="item-check">
            <input type="checkbox"> <span>EPIs (Avental/Protetor de Tireoide) em bom estado.</span>
        </label>
        <label class="item-check">
            <input type="checkbox"> <span>Sinalização luminosa externa funcionando.</span>
        </label>
    </div>

    <button onclick="window.print()" class="btn-pdf">📄 Gerar Relatório (PDF)</button>
</div>

</body>
</html>
