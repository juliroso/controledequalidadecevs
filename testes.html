<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parâmetros Técnicos (CR/DR) - CEVS</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background-color: #F2F2F2; color: #333; }
        header { background-color: #00004B; color: white; padding: 25px; text-align: center; border-bottom: 5px solid #F29509; }
        h1 { font-family: 'Poppins', sans-serif; text-transform: uppercase; margin: 0; font-size: 22px; }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 15px; }
        .btn-voltar { display: inline-block; margin-bottom: 15px; color: #4A0352; text-decoration: none; font-weight: bold; font-family: 'Poppins', sans-serif; }
        
        /* Estilo das Tabelas */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #DFDFDF; font-size: 13px; }
        th { background-color: #4A0352; color: white; font-family: 'Poppins', sans-serif; text-transform: uppercase; font-size: 12px; }
        
        /* Links para Páginas de Teste */
        .link-teste { color: #00004B; text-decoration: none; font-weight: bold; }
        .link-teste:hover { text-decoration: underline; color: #F29509; }

        /* Tags e Destaques */
        .tag-digital { background-color: #e3f2fd; color: #0d47a1; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .tolerancia { color: #d32f2f; font-weight: bold; }
        .categoria { background-color: #FAAF3F; padding: 3px 8px; border-radius: 4px; color: #000; font-weight: bold; font-size: 11px; }

        .info-box { background: white; padding: 25px; border-radius: 8px; border-left: 10px solid #F29509; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #00004B; font-family: 'Poppins', sans-serif; font-size: 18px; margin-top: 0; }
        h3 { color: #4A0352; font-size: 16px; margin: 20px 0 10px; font-family: 'Poppins', sans-serif; }
        
        /* Grade de Artefatos */
        .grid-obs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .obs-item { font-size: 13px; color: #555; display: flex; align-items: center; }
        .obs-item::before { content: "○"; margin-right: 10px; color: #F29509; font-weight: bold; font-size: 16px; }

        /* Rodapé Oficial SES/RS */
        .footer-oficial { background-color: #748da6; color: white; padding: 30px 20px; margin-top: 50px; font-size: 13px; line-height: 1.6; }
        .footer-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .footer-logo img { max-height: 60px; filter: brightness(0) invert(1); }
        .mapa-link { color: white !important; font-weight: bold; text-decoration: underline; background: none !important; }

        /* Botão Voltar ao Topo */
        #btnTop { display: none; position: fixed; bottom: 20px; right: 30px; z-index: 99; border: none; background-color: #333; color: white; cursor: pointer; padding: 15px; border-radius: 5px; opacity: 0.8; }

        @media (max-width: 768px) { .grid-obs { grid-template-columns: 1fr; } .footer-container { flex-direction: column; text-align: center; gap: 20px; } }
    </style>
</head>

</header>
